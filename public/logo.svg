<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Import beautiful Google Font for the typography -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&amp;display=swap');
    </style>
    <!-- Elegant Gradient for the HT Text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Clean dark background is transparent here as requested (assuming background is controlled outside) -->
  
  <!-- Outer glowing and styling ring -->
  <circle cx="200" cy="180" r="130" fill="rgba(11, 22, 34, 0.8)" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.8"/>
  <circle cx="200" cy="180" r="140" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- HT Monogram (Hemanshu Thakar) - Using Modern Typography -->
  <text x="50%" y="54%" font-family="'Outfit', sans-serif" font-size="160" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="url(#textGrad)" letter-spacing="-8">HT</text>

  <!-- Small sleek text '8182' at the bottom -->
  <text x="200" y="370" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" letter-spacing="12" fill="#3b82f6" text-anchor="middle" opacity="0.9">8182</text>
  
</svg>
